name: sip

volumes:
  mariadb-data:
    driver: local

services:
  sip:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sip-manager
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    ports:
      - "80:80"
      - "3307:3306"
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "10000-10100:10000-10100/udp"
    environment:
      DB_PASSWORD: wawa2346
      ASTERISK_AMI_USER: laravel_ami
      ASTERISK_AMI_SECRET: ami_secret
      PUBLIC_IP: ""
      LOCAL_NET: "172.16.0.0/12"
    volumes:
      - ./sip-manager:/var/www/html
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/login > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
